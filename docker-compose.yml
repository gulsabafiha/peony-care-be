services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: peony
      POSTGRES_USER: peony
      POSTGRES_PASSWORD: peony
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peony -d peony"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    entrypoint: ["/app/docker/entrypoint.sh"]
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://peony:peony@db:5432/peony
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
